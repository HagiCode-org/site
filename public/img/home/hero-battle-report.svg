<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hero battle report</title>
  <desc id="desc">Illustration of a battle report dashboard with hero cards, XP, and execution metrics.</desc>
  <rect width="1600" height="900" rx="36" fill="#060B14"/>
  <rect x="32" y="32" width="1536" height="836" rx="28" fill="url(#shell)" stroke="rgba(255,255,255,0.08)"/>

  <text x="86" y="118" fill="#DFF7FF" font-size="38" font-family="Arial, sans-serif" font-weight="700">Hero Battle Report</text>
  <text x="86" y="160" fill="#8FB4D8" font-size="22" font-family="Arial, sans-serif">Daily progress, XP, levels, tool calls, and session output in one view</text>

  <g>
    <rect x="84" y="210" width="420" height="156" rx="28" fill="#102033"/>
    <text x="118" y="262" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Battle Score</text>
    <text x="118" y="320" fill="#F9FBFF" font-size="52" font-family="Arial, sans-serif" font-weight="700">12,480</text>
    <text x="118" y="346" fill="#7EE7C1" font-size="18" font-family="Arial, sans-serif">+18% from yesterday</text>
  </g>
  <g>
    <rect x="528" y="210" width="420" height="156" rx="28" fill="#102033"/>
    <text x="562" y="262" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Active Dungeons</text>
    <text x="562" y="320" fill="#F9FBFF" font-size="52" font-family="Arial, sans-serif" font-weight="700">4</text>
    <text x="562" y="346" fill="#22D3EE" font-size="18" font-family="Arial, sans-serif">Proposal · AutoTask · Prompt</text>
  </g>
  <g>
    <rect x="972" y="210" width="544" height="156" rx="28" fill="#102033"/>
    <text x="1008" y="262" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">XP Today</text>
    <text x="1008" y="320" fill="#F9FBFF" font-size="52" font-family="Arial, sans-serif" font-weight="700">12.8M</text>
    <rect x="1008" y="334" width="452" height="18" rx="9" fill="#1B3150"/>
    <rect x="1008" y="334" width="318" height="18" rx="9" fill="url(#xp)"/>
  </g>

  <g>
    <rect x="84" y="410" width="458" height="368" rx="30" fill="#0D182A" stroke="#1B3150"/>
    <circle cx="154" cy="486" r="42" fill="#25C2A0"/>
    <text x="224" y="480" fill="#F9FBFF" font-size="30" font-family="Arial, sans-serif" font-weight="700">Spec Strategist</text>
    <text x="224" y="520" fill="#8FB4D8" font-size="20" font-family="Arial, sans-serif">Rank #1 · Captain level Lv.27</text>
    <rect x="120" y="570" width="386" height="18" rx="9" fill="#1B3150"/>
    <rect x="120" y="570" width="290" height="18" rx="9" fill="#25C2A0"/>
    <text x="120" y="630" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Tool calls</text>
    <text x="412" y="630" fill="#F9FBFF" font-size="26" font-family="Arial, sans-serif" font-weight="700">184</text>
    <text x="120" y="682" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Execution time</text>
    <text x="354" y="682" fill="#F9FBFF" font-size="26" font-family="Arial, sans-serif" font-weight="700">02:41:18</text>
    <text x="120" y="734" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">XP gained</text>
    <text x="390" y="734" fill="#7EE7C1" font-size="26" font-family="Arial, sans-serif" font-weight="700">+4.2M</text>
  </g>

  <g>
    <rect x="572" y="410" width="458" height="368" rx="30" fill="#0D182A" stroke="#1B3150"/>
    <circle cx="642" cy="486" r="42" fill="#22D3EE"/>
    <text x="712" y="480" fill="#F9FBFF" font-size="30" font-family="Arial, sans-serif" font-weight="700">Patch Runner</text>
    <text x="712" y="520" fill="#8FB4D8" font-size="20" font-family="Arial, sans-serif">Rank #2 · Fixes across 2 instances</text>
    <rect x="608" y="570" width="386" height="18" rx="9" fill="#1B3150"/>
    <rect x="608" y="570" width="258" height="18" rx="9" fill="#22D3EE"/>
    <text x="608" y="630" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Tool calls</text>
    <text x="900" y="630" fill="#F9FBFF" font-size="26" font-family="Arial, sans-serif" font-weight="700">139</text>
    <text x="608" y="682" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Execution time</text>
    <text x="842" y="682" fill="#F9FBFF" font-size="26" font-family="Arial, sans-serif" font-weight="700">01:57:42</text>
    <text x="608" y="734" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">XP gained</text>
    <text x="878" y="734" fill="#7EE7C1" font-size="26" font-family="Arial, sans-serif" font-weight="700">+3.6M</text>
  </g>

  <g>
    <rect x="1060" y="410" width="456" height="368" rx="30" fill="#0D182A" stroke="#1B3150"/>
    <text x="1096" y="470" fill="#F9FBFF" font-size="28" font-family="Arial, sans-serif" font-weight="700">Today at a glance</text>
    <rect x="1096" y="506" width="384" height="76" rx="22" fill="#122236"/>
    <text x="1130" y="550" fill="#DFF7FF" font-size="22" font-family="Arial, sans-serif">Proposal dungeon completed</text>
    <rect x="1096" y="602" width="384" height="76" rx="22" fill="#122236"/>
    <text x="1130" y="646" fill="#DFF7FF" font-size="22" font-family="Arial, sans-serif">AutoTask fixes pushed in parallel</text>
    <rect x="1096" y="698" width="384" height="32" rx="16" fill="#1B3150"/>
    <rect x="1096" y="698" width="286" height="32" rx="16" fill="#F97316"/>
    <text x="1096" y="760" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Battle reports make progress visible without old achievement or efficiency screens</text>
  </g>

  <defs>
    <linearGradient id="shell" x1="70" y1="70" x2="1506" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#09141F"/>
    </linearGradient>
    <linearGradient id="xp" x1="1008" y1="343" x2="1326" y2="343" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#25C2A0"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
</svg>
