<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hero Dungeon roster workspace</title>
  <desc id="desc">Illustration of a Hero Dungeon rail, captain roster, and save controls.</desc>
  <rect width="1600" height="900" rx="36" fill="#0A0F1B"/>
  <rect x="34" y="34" width="1532" height="832" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>

  <rect x="74" y="78" width="330" height="742" rx="28" fill="#0E1627" stroke="#22314D"/>
  <text x="112" y="132" fill="#DFF7FF" font-size="32" font-family="Arial, sans-serif" font-weight="700">Hero Dungeons</text>

  <g>
    <rect x="108" y="176" width="262" height="126" rx="24" fill="#14243B" stroke="#28B4D1"/>
    <text x="136" y="220" fill="#F9FBFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">Proposal Generate</text>
    <text x="136" y="254" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Captain ready · Prompt synced</text>
    <text x="136" y="286" fill="#7EE7C1" font-size="18" font-family="Arial, sans-serif">3 heroes assigned</text>
  </g>
  <g>
    <rect x="108" y="326" width="262" height="126" rx="24" fill="#101C30"/>
    <text x="136" y="370" fill="#F9FBFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">AutoTask</text>
    <text x="136" y="404" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Parallel fixes in progress</text>
    <text x="136" y="436" fill="#FDBA74" font-size="18" font-family="Arial, sans-serif">2 instances active</text>
  </g>
  <g>
    <rect x="108" y="476" width="262" height="126" rx="24" fill="#101C30"/>
    <text x="136" y="520" fill="#F9FBFF" font-size="24" font-family="Arial, sans-serif" font-weight="700">Prompt Dungeon</text>
    <text x="136" y="554" fill="#8FB4D8" font-size="18" font-family="Arial, sans-serif">Preview and style workbench</text>
    <text x="136" y="586" fill="#F9A8D4" font-size="18" font-family="Arial, sans-serif">Visual sync ready</text>
  </g>

  <rect x="446" y="78" width="1086" height="742" rx="28" fill="#0E1627" stroke="#22314D"/>
  <text x="490" y="132" fill="#DFF7FF" font-size="32" font-family="Arial, sans-serif" font-weight="700">Captain Roster Editor</text>
  <text x="490" y="172" fill="#8FB4D8" font-size="21" font-family="Arial, sans-serif">Proposal dungeon · captains, members, prompt cover, save state</text>

  <rect x="490" y="210" width="466" height="252" rx="30" fill="#13233A"/>
  <rect x="520" y="240" width="406" height="170" rx="24" fill="url(#prompt)"/>
  <text x="540" y="438" fill="#E6F1FF" font-size="20" font-family="Arial, sans-serif">Prompt cover preview</text>

  <rect x="982" y="210" width="514" height="252" rx="30" fill="#13233A"/>
  <text x="1018" y="258" fill="#E6F1FF" font-size="22" font-family="Arial, sans-serif" font-weight="700">Current Captain</text>
  <rect x="1018" y="286" width="442" height="62" rx="18" fill="#1A2D48"/>
  <circle cx="1060" cy="317" r="18" fill="#25C2A0"/>
  <text x="1092" y="324" fill="#F9FBFF" font-size="20" font-family="Arial, sans-serif">Spec Strategist</text>
  <rect x="1018" y="372" width="132" height="40" rx="14" fill="#153B35"/>
  <text x="1040" y="398" fill="#B8F5DF" font-size="16" font-family="Arial, sans-serif">Saved</text>
  <rect x="1172" y="372" width="132" height="40" rx="14" fill="#2A1E3D"/>
  <text x="1190" y="398" fill="#F6C7FF" font-size="16" font-family="Arial, sans-serif">Captain ready</text>

  <text x="490" y="534" fill="#DFF7FF" font-size="26" font-family="Arial, sans-serif" font-weight="700">Assigned Heroes</text>
  <g>
    <rect x="490" y="566" width="316" height="96" rx="22" fill="#13233A"/>
    <circle cx="540" cy="614" r="22" fill="#25C2A0"/>
    <text x="580" y="608" fill="#F9FBFF" font-size="22" font-family="Arial, sans-serif">Spec Strategist</text>
    <text x="580" y="636" fill="#8FB4D8" font-size="17" font-family="Arial, sans-serif">Proposal captain</text>
  </g>
  <g>
    <rect x="822" y="566" width="316" height="96" rx="22" fill="#13233A"/>
    <circle cx="872" cy="614" r="22" fill="#22D3EE"/>
    <text x="912" y="608" fill="#F9FBFF" font-size="22" font-family="Arial, sans-serif">Patch Runner</text>
    <text x="912" y="636" fill="#8FB4D8" font-size="17" font-family="Arial, sans-serif">Execution captain</text>
  </g>
  <g>
    <rect x="1154" y="566" width="316" height="96" rx="22" fill="#13233A"/>
    <circle cx="1204" cy="614" r="22" fill="#F472B6"/>
    <text x="1244" y="608" fill="#F9FBFF" font-size="22" font-family="Arial, sans-serif">Prompt Artist</text>
    <text x="1244" y="636" fill="#8FB4D8" font-size="17" font-family="Arial, sans-serif">Visual support</text>
  </g>

  <rect x="490" y="702" width="1006" height="78" rx="24" fill="#122236" stroke="#22314D"/>
  <text x="536" y="750" fill="#DFF7FF" font-size="22" font-family="Arial, sans-serif" font-weight="700">Flow control becomes a visual roster workspace</text>
  <text x="1124" y="750" fill="#8FB4D8" font-size="20" font-family="Arial, sans-serif">Save dungeon</text>

  <defs>
    <linearGradient id="panel" x1="74" y1="78" x2="1510" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09121F"/>
      <stop offset="1" stop-color="#0A1321"/>
    </linearGradient>
    <linearGradient id="prompt" x1="520" y1="240" x2="926" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D3A66"/>
      <stop offset="0.55" stop-color="#6543A5"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
  </defs>
</svg>
